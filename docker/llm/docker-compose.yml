services:

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped

    ports:
      - "11434:11434"

    volumes:
      - /mnt/data/ollama:/root/.ollama

    environment:
      OLLAMA_HOST: 0.0.0.0:11434
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      OLLAMA_MAX_LOADED_MODELS: 1
      OLLAMA_NUM_THREADS: 4
      OLLAMA_FLASH_ATTN: 1

    gpus: all

    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    logging:
      driver: json-file
      options:
        max-size: 100m
        max-file: 3

    security_opt:
      - no-new-privileges:true

    read_only: false

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped

    depends_on:
      ollama:
        condition: service_healthy

    ports:
      - "3000:8080"

    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      DATA_DIR: /app/backend/data

    volumes:
      - /mnt/data/openwebui:/app/backend/data
    healthcheck:
      disable: true
    logging:
      driver: json-file
      options:
        max-size: 100m
        max-file: 3

    security_opt:
      - no-new-privileges:true

    read_only: false

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped

    command:
      - --path.rootfs=/host
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)

    pid: host

    ports:
      - "9100:9100"

    volumes:
      - /:/host:ro,rslave
    healthcheck:
      disable: true
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: 2

    security_opt:
      - no-new-privileges:true
      - apparmor:docker-default

    read_only: true

  dcgm-exporter:
    image: nvcr.io/nvidia/k8s/dcgm-exporter:4.5.2-4.8.1-ubuntu22.04
    container_name: dcgm-exporter
    restart: unless-stopped

    ports:
      - "9400:9400"

    cap_add:
      - SYS_ADMIN

    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility

    gpus: all

    healthcheck:
      disable: true

    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: 2

    security_opt:
      - no-new-privileges:true

    read_only: false

networks:
  default:
    name: llm-network
    driver: bridge