stages:
  - lint
  - test

lint:
  stage: lint
  image: bash:5.2
  script:
    - bash -n scripts/*.sh 2>&1 || exit 1
    - bash -n scripts/lib/*.sh 2>&1 || exit 1
  rules:
    - when: always

syntax_check:
  stage: lint
  image: bash:5.2
  script:
    - |
      for file in scripts/*.sh scripts/lib/*.sh; do
        bash -n "$file" || exit 1
      done
  rules:
    - when: always

shellcheck:
  stage: lint
  image: bash:5.2
  script:
    - if command -v shellcheck >/dev/null 2>&1; then
        shellcheck scripts/*.sh scripts/lib/*.sh --exclude=SC2034,SC2154 || true;
      else
        echo "shellcheck not available, skipping static analysis";
      fi
  rules:
    - when: always

test:
  stage: test
  image: ubuntu:24.04
  script:
    - apt-get update -qq
    - apt-get install -y -qq bash coreutils git rsync ssh jq yq
    - if [[ -f scripts/deployment-test-provisioning.sh ]]; then
        bash scripts/deployment-test-config-regressions.sh || true;
      else
        echo "Test scripts not found";
      fi
  rules:
    - when: always

deploy:
  stage: test
  image: ubuntu:24.04
  script:
    - apt-get update -qq
    - apt-get install -y -qq bash coreutils git rsync ssh jq yq
    - echo "$SSH_PRIVATE_KEY" | base64 -d > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - echo "$SSH_HOST_KEY" > ~/.ssh/known_hosts
    - ssh -o BatchMode=yes -o ConnectTimeout=10 $PROXMOX_USER@$PROXMOX_HOST "echo 'SSH connection successful'" || exit 1
    - echo "Proxmox connection verified"
  environment:
    name: production
  rules:
    - if: $CI_COMMIT_BRANCH == "release"
      when: manual
